<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .gradient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                -45deg,
                #ee7752,
                #e73c7e,
                #23a6d5,
                #23d5ab
            );
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: 1;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            max-width: 800px;
            padding: 20px;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            animation: fadeInUp 1s ease 0.4s both;
            opacity: 0.95;
        }

        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            background: white;
            color: #23a6d5;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 1s ease 0.6s both;
            cursor: pointer;
            border: none;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1.1rem;
            }

            .cta-button {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }

        .content-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9fafb;
            padding: 80px 20px;
        }

        .content-inner {
            max-width: 800px;
            text-align: center;
        }

        .content-inner h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 1rem;
        }

        .content-inner p {
            font-size: 1.2rem;
            color: #555;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .content-inner h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="gradient-bg"></div>
        <div class="hero-content">
            <h1>Welcome to Your Site</h1>
            <p>Experience the beauty of animated gradients and smooth interactions</p>
            <button class="cta-button">Book Now</button>
        </div>
    </section>

    <section class="content-section" id="get-started">
        <div class="content-inner">
            <h2>Let's Get Started</h2>
            <p>This is where your next section begins. Add your content, features, or call-to-action here to guide your visitors forward.</p>
        </div>
    </section>

    <script>
        document.querySelector('.cta-button').addEventListener('click', function() {
            document.getElementById('get-started').scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
